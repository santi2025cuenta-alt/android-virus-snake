<!DOCTYPE html>
<html>
<head>
    <title>Android Virus - Snake Injection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #0f0; text-align: center; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { border: 2px solid #0f0; background: #050505; display: block; margin: 10px auto; touch-action: none; }
        .info { padding: 10px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="info">SISTEMA: SNAKE VIRUS | ADC: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    <div style="font-size: 0.8em;">USA LAS FLECHAS O DESLIZÁ PARA MOVER</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        let box = 20;
        let snake = [{x: 9 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random()*15)*box, y: Math.floor(Math.random()*15)*box };
        let d;
        let score = 0;
        let raw_coins = 0; // Monedas recolectadas

        document.addEventListener("keydown", direction);
        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++){
                ctx.fillStyle = (i == 0) ? "#0f0" : "#080";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "white"; // La "moneda" Android
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y){
                raw_coins++;
                // Lógica: 1ra moneda = 10, las demás +1
                if(raw_coins === 1) score = 10;
                else score++;
                
                scoreElement.innerText = score;
                food = { x: Math.floor(Math.random()*15)*box, y: Math.floor(Math.random()*15)*box };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over
            if(snakeX < 0 || snakeY < 0 || snakeX >= canvas.width || snakeY >= canvas.height || collision(newHead, snake)){
                clearInterval(game);
                finalizarJuego();
            }

            snake.unshift(newHead);
        }

        function collision(head, array){
            for(let i = 0; i < array.length; i++) if(head.x == array[i].x && head.y == array[i].y) return true;
            return false;
        }

        function finalizarJuego() {
            // Hash de seguridad para evitar que editen el score en consola
            const check = btoa("VIRUS_" + score + "_" + raw_coins);
            tg.sendData(JSON.stringify({ "puntos": score, "hash": check }));
        }

        let game = setInterval(draw, 150);
    </script>
</body>
</html>
