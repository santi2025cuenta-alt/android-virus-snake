<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Android Virus - Snake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #ffffff; color: #333; text-align: center; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { padding: 10px; background: #f8f9fa; border-bottom: 2px solid #28a745; }
        .score-value { font-size: 2em; font-weight: bold; color: #28a745; }
        canvas { border: 3px solid #28a745; background: #fff; display: block; margin: 10px auto; width: 80vw; height: 80vw; max-width: 300px; max-height: 300px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); width: 180px; margin: 10px auto; gap: 10px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; font-size: 1.5em; border-radius: 10px; touch-action: manipulation; }
        #retry-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 2px solid #28a745; border-radius: 15px; z-index: 10; width: 200px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 0.9em; color: #666;">PUNTOS</div>
        <div class="score-value" id="score">0</div>
    </div>
    <canvas id="gc" width="300" height="300"></canvas>
    
    <div class="controls">
        <div></div><button class="btn" onclick="setDir('UP')">▲</button><div></div>
        <button class="btn" onclick="setDir('LEFT')">◀</button>
        <button class="btn" onclick="setDir('DOWN')">▼</button>
        <button class="btn" onclick="setDir('RIGHT')">▶</button>
    </div>

    <div id="retry-screen">
        <h2 style="color:#dc3545; margin:0;">¡GAME OVER!</h2>
        <p id="status-text"></p>
        <button class="btn" style="width:100%; margin-bottom:10px;" onclick="enviarYReiniciar()">REINTENTAR</button>
        <button class="btn" style="width:100%; background:#dc3545;" onclick="tg.close()">SALIR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const cvs = document.getElementById("gc"), ctx = cvs.getContext("2d");
        let box = 20, snake, food, d, score, monedas, game;

        // --- CONTROL POR TECLADO (NUEVO) ---
        document.addEventListener("keydown", function(e) {
            const key = e.key.toUpperCase();
            
            // WASD o Flechas
            if ((key === "W" || key === "ARROWUP") && d !== "DOWN") d = "UP";
            if ((key === "S" || key === "ARROWDOWN") && d !== "UP") d = "DOWN";
            if ((key === "A" || key === "ARROWLEFT") && d !== "RIGHT") d = "LEFT";
            if ((key === "D" || key === "ARROWRIGHT") && d !== "LEFT") d = "RIGHT";

            // Evitar que las flechas muevan la pantalla del navegador
            if(["ARROWUP","ARROWDOWN","ARROWLEFT","ARROWRIGHT"].includes(key)) {
                e.preventDefault();
            }
        });

        function setDir(n) { 
            if(n=='LEFT'&&d!='RIGHT')d='LEFT'; if(n=='UP'&&d!='DOWN')d='UP';
            if(n=='RIGHT'&&d!='LEFT')d='RIGHT'; if(n=='DOWN'&&d!='UP')d='DOWN';
        }

        function enviarYReiniciar() {
            if (score > 0) {
                try {
                    tg.sendData(JSON.stringify({"puntos": score}));
                } catch (e) {
                    console.log("Error al enviar datos");
                }
            }
            resetGame();
        }

        function resetGame() {
            document.getElementById("retry-screen").style.display = "none";
            snake = [{x:7*box,y:10*box},{x:6*box,y:10*box},{x:5*box,y:10*box}];
            food = {x:Math.floor(Math.random()*14)*box, y:Math.floor(Math.random()*14)*box};
            d="RIGHT"; score=0; monedas=0;
            document.getElementById("score").innerText="0";
            if(game) clearInterval(game);
            game = setInterval(draw, 140);
        }

        function draw() {
            ctx.fillStyle = "white"; ctx.fillRect(0,0,300,300);
            for(let i=0;i<snake.length;i++){
                ctx.fillStyle=(i==0)?"#28a745":"#5cb85c";
                ctx.fillRect(snake[i].x,snake[i].y,box-1,box-1);
            }
            ctx.fillStyle="#ffc107";
            ctx.beginPath(); ctx.arc(food.x+10,food.y+10,8,0,Math.PI*2); ctx.fill();

            let sx=snake[0].x, sy=snake[0].y;
            if(d=="LEFT")sx-=box; if(d=="UP")sy-=box; if(d=="RIGHT")sx+=box; if(d=="DOWN")sy+=box;

            if(sx==food.x && sy==food.y){
                monedas++;
                score = (monedas===1) ? 10 : score + 1;
                document.getElementById("score").innerText=score;
                food={x:Math.floor(Math.random()*14)*box, y:Math.floor(Math.random()*14)*box};
            } else { snake.pop(); }

            let head={x:sx,y:sy};
            if(sx<0||sy<0||sx>=300||sy>=300||snake.some(s=>s.x==head.x&&s.y==head.y)){
                clearInterval(game);
                document.getElementById("status-text").innerText="Total: "+score+" ADC";
                document.getElementById("retry-screen").style.display="block";
                if(score>0) try { tg.sendData(JSON.stringify({"puntos": score})); } catch(e){}
                return;
            }
            snake.unshift(head);
        }
        resetGame();
    </script>
</body>
</html>
