<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Android Virus - Snake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #ffffff; color: #333; text-align: center; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { padding: 10px; background: #f8f9fa; border-bottom: 2px solid #28a745; }
        .score-value { font-size: 2em; font-weight: bold; color: #28a745; }
        canvas { border: 3px solid #28a745; background: #fff; display: block; margin: 10px auto; width: 80vw; height: 80vw; max-width: 300px; max-height: 300px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); width: 180px; margin: 10px auto; gap: 10px; }
        .btn { background: #28a745; color: white; border: none; padding: 15px; font-size: 1.5em; border-radius: 10px; touch-action: manipulation; }
        #retry-screen { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 2px solid #28a745; border-radius: 15px; z-index: 10; width: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .btn-retry { background: #28a745; width: 100%; margin-bottom: 10px; }
        .btn-exit { background: #dc3545; width: 100%; }
        #loading-text { font-size: 0.8em; color: #666; display: none; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 0.9em; color: #666;">PUNTOS</div>
        <div class="score-value" id="score">0</div>
    </div>
    <canvas id="gc" width="300" height="300"></canvas>
    
    <div class="controls">
        <div></div><button class="btn" onclick="setDir('UP')">▲</button><div></div>
        <button class="btn" onclick="setDir('LEFT')">◀</button>
        <button class="btn" onclick="setDir('DOWN')">▼</button>
        <button class="btn" onclick="setDir('RIGHT')">▶</button>
    </div>

    <div id="retry-screen">
        <h2 style="color:#dc3545; margin:0 0 10px 0;">¡GAME OVER!</h2>
        <p id="status-text" style="font-weight:bold;"></p>
        <div id="loading-text">Enviando ADC...</div>
        <button class="btn btn-retry" id="btn-env" onclick="enviarYReiniciar()">REINTENTAR / ENVIAR</button>
        <button class="btn btn-exit" onclick="tg.close()">SALIR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const cvs = document.getElementById("gc"), ctx = cvs.getContext("2d");
        let box = 20, snake, food, d, score, monedas, game;
        let enviando = false;

        // --- DIRECCIONES ---
        function setDir(n) { 
            if(n=='LEFT'&&d!='RIGHT')d='LEFT'; if(n=='UP'&&d!='DOWN')d='UP';
            if(n=='RIGHT'&&d!='LEFT')d='RIGHT'; if(n=='DOWN'&&d!='UP')d='DOWN';
        }

        // --- ENVIAR PUNTOS Y REINICIAR ---
        async function enviarYReiniciar() {
            if (enviando) return;
            
            if (score > 0) {
                enviando = true;
                document.getElementById("loading-text").style.display = "block";
                document.getElementById("btn-env").innerText = "PROCESANDO...";

                const userId = (tg.initDataUnsafe && tg.initDataUnsafe.user) ? tg.initDataUnsafe.user.id : "TEST_USER";
                // URL DE TU TÚNEL (Verifica que sea la misma de Termux)
                const TUNEL_URL = "https://faf65aa98b6ea21-190-246-115-76.serveusercontent.com"; 

                try {
                    // Llamada al servidor Flask en Termux
                    await fetch(`${TUNEL_URL}/inyectar?id=${userId}&puntos=${score}`, { mode: 'no-cors' });
                    console.log("Datos enviados al túnel correctamente.");
                } catch (e) {
                    console.error("Error al conectar con el túnel.");
                }
            }
            
            enviando = false;
            document.getElementById("loading-text").style.display = "none";
            document.getElementById("btn-env").innerText = "REINTENTAR / ENVIAR";
            resetGame();
        }

        function resetGame() {
            document.getElementById("retry-screen").style.display = "none";
            snake = [{x:7*box,y:10*box},{x:6*box,y:10*box},{x:5*box,y:10*box}];
            food = {x:Math.floor(Math.random()*14)*box, y:Math.floor(Math.random()*14)*box};
            d="RIGHT"; score=0; monedas=0;
            document.getElementById("score").innerText="0";
            if(game) clearInterval(game);
            game = setInterval(draw, 140);
        }

        function draw() {
            ctx.fillStyle = "white"; ctx.fillRect(0,0,300,300);
            
            for(let i=0;i<snake.length;i++){
                ctx.fillStyle=(i==0)?"#28a745":"#5cb85c";
                ctx.fillRect(snake[i].x,snake[i].y,box-1,box-1);
            }

            ctx.fillStyle="#ffc107";
            ctx.beginPath(); ctx.arc(food.x+10,food.y+10,8,0,Math.PI*2); ctx.fill();

            let sx=snake[0].x, sy=snake[0].y;
            if(d=="LEFT")sx-=box; if(d=="UP")sy-=box; if(d=="RIGHT")sx+=box; if(d=="DOWN")sy+=box;

            if(sx==food.x && sy==food.y){
                monedas++;
                score = (monedas===1) ? 10 : score + 1;
                document.getElementById("score").innerText=score;
                food={x:Math.floor(Math.random()*14)*box, y:Math.floor(Math.random()*14)*box};
            } else { snake.pop(); }

            let head={x:sx,y:sy};

            // CHOQUE
            if(sx<0||sy<0||sx>=300||sy>=300||snake.some(s=>s.x==head.x&&s.y==head.y)){
                clearInterval(game);
                document.getElementById("status-text").innerText="Total: "+score+" ADC";
                document.getElementById("retry-screen").style.display="block";
                // IMPORTANTE: Eliminamos tg.sendData() de aquí para que no se cierre solo.
                return;
            }
            snake.unshift(head);
        }

        resetGame();
    </script>
</body>
</html>
