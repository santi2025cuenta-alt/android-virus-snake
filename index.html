<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Android Virus - Snake</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: #ffffff; color: #333; text-align: center; 
            font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; 
        }
        .header { padding: 10px; background: #f8f9fa; border-bottom: 2px solid #28a745; }
        .score-label { font-size: 0.9em; color: #666; }
        .score-value { font-size: 2em; font-weight: bold; color: #28a745; }
        
        canvas { 
            border: 3px solid #28a745; background: #fff; 
            display: block; margin: 10px auto;
            width: 80vw; height: 80vw; max-width: 300px; max-height: 300px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 180px; margin: 10px auto; gap: 10px;
        }
        .btn {
            background: #28a745; color: white; border: none;
            padding: 15px; font-size: 1.5em; border-radius: 10px;
            touch-action: manipulation; cursor: pointer;
        }
        .btn:active { background: #1e7e34; }
        .btn-exit { background: #dc3545; margin-top: 10px; padding: 10px; font-size: 1.2em; }

        #retry-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 20px; border: 2px solid #28a745; border-radius: 15px; z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            width: 200px;
        }

        #lock-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 999; color: #dc3545; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="font-size: 3em;">⚠️</h1>
        <h2>ACCESO DENEGADO</h2>
        <p>Este juego solo funciona dentro del Bot oficial de Telegram.</p>
    </div>

    <div class="header">
        <div class="score-label">PUNTOS</div>
        <div class="score-value" id="score">0</div>
    </div>

    <canvas id="gc" width="300" height="300"></canvas>

    <div class="controls" id="pad">
        <div></div><button class="btn" onclick="setDir('UP')">▲</button><div></div>
        <button class="btn" onclick="setDir('LEFT')">◀</button>
        <button class="btn" onclick="setDir('DOWN')">▼</button>
        <button class="btn" onclick="setDir('RIGHT')">▶</button>
    </div>

    <div id="retry-screen">
        <h2 style="color:#dc3545; margin-top:0;">¡GAME OVER!</h2>
        <p id="status-text">Calculando ADC...</p>
        <button class="btn" onclick="enviarYReiniciar()">REINTENTAR</button>
        <button class="btn btn-exit" onclick="tg.close()">SALIR Y GUARDAR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
            if (window.location.hostname !== "localhost") {
                document.getElementById("lock-screen").style.display = "flex";
            }
        }

        const cvs = document.getElementById("gc"), ctx = cvs.getContext("2d");
        let box = 20, snake, food, d, score, monedas, game;

        function setDir(newDir) {
            if(newDir == "LEFT" && d != "RIGHT") d = "LEFT";
            if(newDir == "UP" && d != "DOWN") d = "UP";
            if(newDir == "RIGHT" && d != "LEFT") d = "RIGHT";
            if(newDir == "DOWN" && d != "UP") d = "DOWN";
        }

        document.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase();
            if (key === "arrowup" || key === "w") setDir("UP");
            if (key === "arrowdown" || key === "s") setDir("DOWN");
            if (key === "arrowleft" || key === "a") setDir("LEFT");
            if (key === "arrowright" || key === "d") setDir("RIGHT");
        });

        function enviarYReiniciar() {
            if (score > 0) {
                try {
                    tg.sendData(JSON.stringify({"puntos": score}));
                } catch (e) { console.log("Error de envío"); }
            }
            resetGame();
        }

        function resetGame() {
            document.getElementById("retry-screen").style.display = "none";
            snake = [{x: 7*box, y: 10*box}, {x: 6*box, y: 10*box}, {x: 5*box, y: 10*box}];
            food = {x: Math.floor(Math.random()*13+1)*box, y: Math.floor(Math.random()*13+1)*box};
            d = "RIGHT"; 
            score = 0; 
            monedas = 0; 
            document.getElementById("score").innerText = "0";
            if(game) clearInterval(game);
            game = setInterval(draw, 140);
        }

        function draw() {
            ctx.fillStyle = "white"; ctx.fillRect(0,0,300,300);
            
            for(let i=0; i<snake.length; i++){
                ctx.fillStyle = (i==0) ? "#28a745" : "#5cb85c";
                ctx.fillRect(snake[i].x, snake[i].y, box-1, box-1);
            }

            ctx.fillStyle = "#ffc107";
            ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 8, 0, Math.PI*2); ctx.fill();

            let sx = snake[0].x, sy = snake[0].y;
            if(d=="LEFT") sx-=box; if(d=="UP") sy-=box; if(d=="RIGHT") sx+=box; if(d=="DOWN") sy+=box;

            if(sx==food.x && sy==food.y){
                monedas++; 
                
                // LÓGICA DE PUNTOS REPARADA:
                if(monedas === 1) {
                    score = 10; // Primera moneda pone el contador en 10
                } else {
                    score = score + 1; // Las siguientes suman de a 1
                }

                document.getElementById("score").innerText = score;
                food = {x: Math.floor(Math.random()*13+1)*box, y: Math.floor(Math.random()*13+1)*box};
            } else { snake.pop(); }

            let head = {x:sx, y:sy};
            
            if(sx<0 || sy<0 || sx>=300 || sy>=300 || snake.some(s=>s.x==head.x && s.y==head.y)){
                clearInterval(game);
                document.getElementById("status-text").innerText = "Total ADC: " + score;
                document.getElementById("retry-screen").style.display = "block";
                return;
            }
            snake.unshift(head);
        }
        resetGame();
    </script>
</body>
</html>
